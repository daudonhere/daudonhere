name: Daily Profile Activity

on:
  schedule:
    - cron: "0 17 * * *"
  workflow_dispatch:

jobs:
  daily-activity:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update daily activity log
        run: |
          mkdir -p logs
          echo "Daily activity: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> logs/activity.log

      - name: Commit and push changes
        run: |
          git config user.name "daudonhere"
          git config user.email "hellodadedaud@gmail.com"
          git add logs/activity.log
          git commit -m "chore: update daily activity log" || echo "No changes to commit"
          git push
