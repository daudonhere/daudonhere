<style>

<script>
// Color mapping untuk bahasa pemrograman
const languageColors = {
  'TypeScript': '#3178c6',
  'Python': '#3776ab',
  'JavaScript': '#f7df1e',
  'HTML': '#e34c26',
  'CSS': '#563d7c',
  'Java': '#007396',
  'Go': '#00add8',
  'Rust': '#ce422b',
  'C++': '#00599c',
  'C#': '#239120',
  'PHP': '#777bb4',
  'Ruby': '#cc342d',
  'Swift': '#fa7343',
  'Kotlin': '#7f52ff',
  'Solidity': '#aa6746',
  'Lua': '#000080',
  'Shell': '#89e051',
  'Dockerfile': '#384d54',
  'JSON': '#292929',
  'YAML': '#cb171e',
};

// Fetch semua repositories dan calculate total language usage
async function fetchAllLanguages() {
  try {
    const username = 'daudonhere';
    const allLanguages = {};
    let page = 1;
    let hasMore = true;

    // Fetch semua repositories
    while (hasMore) {
      const response = await fetch(
        `https://api.github.com/users/${username}/repos?per_page=100&page=${page}&sort=updated`
      );
      
      if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
      
      const repos = await response.json();
      
      if (repos.length === 0) {
        hasMore = false;
        break;
      }

      // Fetch language data untuk setiap repository
      for (const repo of repos) {
        try {
          const langResponse = await fetch(
            `https://api.github.com/repos/${username}/${repo.name}/languages`
          );
          
          if (langResponse.ok) {
            const languages = await langResponse.json();
            
            // Aggregate languages
            for (const [lang, bytes] of Object.entries(languages)) {
              allLanguages[lang] = (allLanguages[lang] || 0) + bytes;
            }
          }
        } catch (error) {
          console.warn(`Error fetching languages for ${repo.name}:`, error);
        }
      }

      page++;
    }

    if (Object.keys(allLanguages).length > 0) {
      renderLanguages(allLanguages);
    }
  } catch (error) {
    console.error('Error fetching languages:', error);
    showErrorMessage();
  }
}

function renderLanguages(languages) {
  const total = Object.values(languages).reduce((a, b) => a + b, 0);
  const languageContainer = document.getElementById('languagesGrid');
  
  // Clear skeleton
  languageContainer.innerHTML = '';
  
  // Sort languages by usage (top 8)
  const sorted = Object.entries(languages)
    .sort((a, b) => b[1] - a[1])
    .slice(0, 8);

  sorted.forEach(([lang, bytes], index) => {
    const percentage = ((bytes / total) * 100).toFixed(1);
    const color = languageColors[lang] || '#888888';
    
    const item = document.createElement('div');
    item.className = 'language-item';
    
    // Format bytes to readable format
    const formattedBytes = formatBytes(bytes);
    
    item.innerHTML = `
      <div class="language-badge">
        <span class="language-color" style="background-color: ${color};"></span>
        <span class="language-name">${lang}</span>
      </div>
      <div class="language-bar">
        <div class="language-progress" style="width: ${percentage}%; animation-delay: ${index * 0.1}s;"></div>
      </div>
      <div>
        <span class="language-percentage">${percentage}%</span>
        <span class="language-bytes">${formattedBytes}</span>
      </div>
    `;
    
    languageContainer.appendChild(item);
  });

  // Update total bytes
  document.getElementById('totalBytes').textContent = formatBytes(total);
}

function formatBytes(bytes) {
  if (bytes === 0) return '0 Bytes';
  
  const k = 1024;
  const sizes = ['Bytes', 'KB', 'MB', 'GB'];
  const i = Math.floor(Math.log(bytes) / Math.log(k));
  
  return Math.round((bytes / Math.pow(k, i)) * 100) / 100 + ' ' + sizes[i];
}

function showErrorMessage() {
  const container = document.getElementById('languagesGrid');
  container.innerHTML = `
    <div style="grid-column: 1/-1; text-align: center; color: #fff; padding: 2rem;">
      <p>Unable to load language statistics. Please try refreshing the page.</p>
    </div>
  `;
}

// Fetch languages saat halaman dimuat
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', fetchAllLanguages);
} else {
  fetchAllLanguages();
}
</script>
